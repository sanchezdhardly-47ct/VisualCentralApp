name: visual_central
description: "Aplicación de control de acceso biométrico facial"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  
  # Firebase
  firebase_core: ^3.9.0
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.6.0
  firebase_app_check: ^0.3.2
  
  # Cloudinary (para almacenamiento de imágenes)
  cloudinary_public: ^0.23.1
  
  # Cámara y ML
  camera: ^0.10.5
  google_mlkit_face_detection: ^0.9.0
  google_mlkit_commons: ^0.6.0
  image_picker: ^1.0.5
  
  # Utilidades
  path_provider: ^2.1.1
  provider: ^6.1.1
  intl: ^0.18.1
  permission_handler: ^11.0.1
  
  # 👇 NUEVAS DEPENDENCIAS PARA ESP32 Y VERIFICACIÓN FACIAL
  webview_flutter: ^4.4.0      # Para mostrar el stream del ESP32
  http: ^1.1.0                  # Para peticiones HTTP al ESP32
  google_mlkit_face_detection: ^0.9.0  # Ya la tienes, es para detección facial

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  
flutter_localizations:
  sdk: flutter